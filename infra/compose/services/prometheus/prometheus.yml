global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'allora-prod'
    environment: 'production'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Caddy
  - job_name: 'caddy'
    static_configs:
      - targets: ['caddy:2019']
    metrics_path: '/metrics'

  # Docker (via cAdvisor, requires additional setup)
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['cadvisor:8080']

  # Node exporter (requires additional setup)
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node-exporter:9100']

  # Application metrics (when instrumented)
  # - job_name: 'allora-api'
  #   static_configs:
  #     - targets: ['api:7500']
  #   metrics_path: '/metrics'

  # - job_name: 'allora-web'
  #   static_configs:
  #     - targets: ['web:7501']
  #   metrics_path: '/metrics'
