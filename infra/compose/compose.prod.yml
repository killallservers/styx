version: '3.8'

services:
  registry:
    build:
      context: ../..
      dockerfile: infra/compose/Dockerfile.registry
    container_name: styx-registry
    restart: unless-stopped
    ports:
      - "127.0.0.1:7506:7506"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7506/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - styx-internal

  caddy:
    image: caddy:2-alpine
    container_name: styx-caddy
    restart: unless-stopped
    depends_on:
      - registry
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-registry.styx.sh}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2019/status"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - styx-internal

networks:
  styx-internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
