# Example: Full-Stack Application
# Node.js frontend + Go backend + PostgreSQL database + Redis cache

[tools]
# Backend
golang = "1.23.1"

# Frontend
node = "20.10.0"

# Database & Cache
postgres = "15.3"

# Development & Debugging
ripgrep = "14.1.0"   # Code search
fd = "10.0.0"        # Fast find

[env]
# Frontend (Node)
NODE_ENV = "development"
FRONTEND_PORT = "3000"
API_BASE_URL = "http://localhost:8080"

# Backend (Go)
GOPATH = "/home/user/.go"
API_PORT = "8080"
API_HOST = "0.0.0.0"

# Database & Cache
DATABASE_URL = "postgresql://localhost:5432/fullstack_dev"
DATABASE_MAX_CONNECTIONS = "20"
REDIS_URL = "redis://localhost:6379"

# Debugging
DEBUG = "true"
LOG_LEVEL = "debug"
RUST_BACKTRACE = "1"
