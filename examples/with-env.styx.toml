# Styx configuration with environment variables
# Useful for projects that need specific development environment setup

[tools]
golang = "1.22.0"
nodejs = "20.10.0"
rust = "1.75.0"
ripgrep = "14.1.0"

[env]
GOPATH = "${HOME}/.styx/go"
NODE_ENV = "development"
RUST_BACKTRACE = "1"
DATABASE_URL = "postgresql://localhost/styx_dev"
