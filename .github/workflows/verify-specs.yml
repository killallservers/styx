name: Verify Tool Specs

on:
  push:
    branches: [main]
    paths:
      - 'pkg/registry/**'
      - '.github/workflows/verify-specs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pkg/registry/**'

jobs:
  verify-specs:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Build Styx
        run: go build -o bin/styx ./cmd/styx

      - name: Verify registry and tools on platform
        run: |
          set -e

          # Determine platform
          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)

          if [ "$OS" = "darwin" ]; then
            if [ "$ARCH" = "arm64" ]; then
              PLATFORM="darwin-arm64"
            else
              PLATFORM="darwin-x86_64"
            fi
          elif [ "$OS" = "linux" ]; then
            PLATFORM="linux-x86_64"
          else
            echo "Unsupported platform: $OS/$ARCH"
            exit 1
          fi

          echo "Platform: $PLATFORM"
          echo ""

          # Verify registry loads and contains expected tools
          go run <<'SCRIPT'
          package main
          import (
              "fmt"
              "log"
              "github.com/killallservers/styx/pkg/registry"
          )
          func main() {
              reg, err := registry.LoadEmbeddedRegistry()
              if err != nil {
                  log.Fatalf("Failed to load registry: %v", err)
              }

              expectedTools := []string{"ripgrep", "fd", "bat", "eza", "golang", "rust", "node", "python", "postgres", "redis", "just"}

              fmt.Printf("Registry loaded with %d tools\n", len(reg))

              for _, toolName := range expectedTools {
                  if spec, ok := reg[toolName]; !ok {
                      log.Fatalf("Expected tool %q not found", toolName)
                  } else {
                      fmt.Printf("  ✓ %s available\n", toolName)
                      for version := range spec.Versions {
                          fmt.Printf("    - %s\n", version)
                      }
                  }
              }
          }
          SCRIPT

          echo ""
          echo "✓ Registry verification passed"

  registry-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Validate registry structure
        run: |
          echo "Validating embedded registry..."

          go run <<'SCRIPT'
          package main
          import (
              "fmt"
              "log"
              "github.com/killallservers/styx/pkg/registry"
          )
          func main() {
              reg, err := registry.LoadEmbeddedRegistry()
              if err != nil {
                  log.Fatalf("Failed to load registry: %v", err)
              }

              expectedTools := []string{"ripgrep", "fd", "bat", "eza", "golang", "rust", "node", "python", "postgres", "redis", "just"}

              if len(reg) != len(expectedTools) {
                  log.Fatalf("Expected %d tools, got %d", len(expectedTools), len(reg))
              }

              fmt.Printf("✓ Registry has all %d expected tools\n", len(expectedTools))

              for _, toolName := range expectedTools {
                  if _, ok := reg[toolName]; !ok {
                      log.Fatalf("Tool %q missing from registry", toolName)
                  }
              }
          }
          SCRIPT

  version-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Validate all version specs
        run: |
          echo "Validating version specifications..."

          go run <<'SCRIPT'
          package main
          import (
              "fmt"
              "log"
              "regexp"
              "github.com/killallservers/styx/pkg/registry"
          )

          func main() {
              reg, err := registry.LoadEmbeddedRegistry()
              if err != nil {
                  log.Fatalf("Failed to load registry: %v", err)
              }

              // Regex for semantic versioning
              semverPattern := regexp.MustCompile(`^\d+\.\d+\.\d+$`)
              // Regex for SHA256 (64 hex chars)
              checksumPattern := regexp.MustCompile(`^[a-f0-9]{64}$`)

              validToolCount := 0
              validVersionCount := 0

              for toolName, spec := range reg {
                  if len(spec.Versions) == 0 {
                      log.Fatalf("Tool %s has no versions defined", toolName)
                  }

                  validToolCount++

                  for version, versionSpec := range spec.Versions {
                      // Check version format
                      if !semverPattern.MatchString(version) {
                          log.Fatalf("Invalid version format for %s: %s (expected X.Y.Z)", toolName, version)
                      }

                      // Check methods exist
                      if len(versionSpec.Methods) == 0 {
                          log.Fatalf("No install methods for %s@%s", toolName, version)
                      }

                      // Validate each method
                      for _, method := range versionSpec.Methods {
                          if method.Type == "binary" {
                              // Check platforms
                              if len(method.Platforms) == 0 {
                                  log.Fatalf("No platforms for %s@%s", toolName, version)
                              }

                              // Check checksums
                              if len(method.Checksums) == 0 {
                                  log.Fatalf("No checksums for %s@%s", toolName, version)
                              }

                              // Validate each checksum
                              for platform, checksum := range method.Checksums {
                                  if !checksumPattern.MatchString(checksum) {
                                      log.Fatalf("Invalid SHA256 for %s@%s on %s: %s (expected 64 hex chars)",
                                          toolName, version, platform, checksum)
                                  }
                              }

                              // Check executable name
                              if method.Executable == "" {
                                  log.Fatalf("No executable name for %s@%s", toolName, version)
                              }
                          }
                      }

                      validVersionCount++
                  }
              }

              fmt.Printf("✓ Validated %d tools with %d versions total\n", validToolCount, validVersionCount)
              fmt.Println("✓ All checksums are valid SHA256")
              fmt.Println("✓ All versions follow semantic versioning")
          }
          SCRIPT

  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Run Go vet on registry
        run: |
          echo "Running Go vet on registry package..."
          go vet ./pkg/registry/...
          echo "✓ Registry passed Go vet checks"

      - name: Run registry tests
        run: |
          echo "Running registry tests..."
          go test -v ./pkg/registry/...
          echo "✓ All registry tests passed"

  summary:
    runs-on: ubuntu-latest
    needs: [verify-specs, registry-integrity, version-validation, code-quality]
    if: always()
    steps:
      - name: Report spec verification results
        run: |
          echo "=== Spec Verification Summary ==="
          echo ""

          if [ "${{ needs.verify-specs.result }}" = "success" ]; then
            echo "✓ verify-specs (platform testing)"
          else
            echo "✗ verify-specs FAILED"
          fi

          if [ "${{ needs.registry-integrity.result }}" = "success" ]; then
            echo "✓ registry-integrity (structure validation)"
          else
            echo "✗ registry-integrity FAILED"
          fi

          if [ "${{ needs.version-validation.result }}" = "success" ]; then
            echo "✓ version-validation (checksum & format)"
          else
            echo "✗ version-validation FAILED"
          fi

          if [ "${{ needs.code-quality.result }}" = "success" ]; then
            echo "✓ code-quality (vet + tests)"
          else
            echo "✗ code-quality FAILED"
          fi

          echo ""

          if [ "${{ needs.verify-specs.result }}" = "success" ] && \
             [ "${{ needs.registry-integrity.result }}" = "success" ] && \
             [ "${{ needs.version-validation.result }}" = "success" ] && \
             [ "${{ needs.code-quality.result }}" = "success" ]; then
            echo "✅ ALL CHECKS PASSED"
            echo ""
            echo "Registry is ready for use:"
            echo "  • All tools verified"
            echo "  • All checksums valid (SHA256)"
            echo "  • All versions correct (semantic versioning)"
            echo "  • Code quality verified"
            exit 0
          else
            echo "❌ SOME CHECKS FAILED"
            exit 1
          fi
